name: Feature Request
description: Suggest a new feature for StellaLib
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for StellaLib? We'd love to hear it! Please fill out the form below.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature you'd like.
      placeholder: I'd like StellaLib to support...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this feature would solve or the workflow it would improve.
      placeholder: Currently I have to manually... This feature would allow...
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API
      description: How would developers use this feature? Show example code.
      render: typescript
      placeholder: |
        const player = manager.create({
          guild: "123",
          // new option here
        });

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area of StellaLib does this relate to?
      options:
        - Manager
        - Node / Failover
        - Player / Playback
        - Queue
        - Filters / Audio
        - Search / Caching
        - Session Persistence
        - Autoplay Engine
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — I have a workaround
        - Critical — blocking my use case

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, references, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and feature requests
          required: true
        - label: I have checked the [documentation](https://github.com/Roki-Stella-Projects/StellaLib/tree/main/docs) for existing functionality
          required: true
