name: Bug Report
description: Report a bug in StellaLib
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I call player.moveNode()...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Set up manager with 2 nodes
        2. Create a player and start playing
        3. Destroy node-1
        4. Observe error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or stack traces.
    validations:
      required: true

  - type: input
    id: stellalib-version
    attributes:
      label: StellaLib Version
      placeholder: "1.1.2"
    validations:
      required: true

  - type: input
    id: lavalink-version
    attributes:
      label: Lavalink Version
      placeholder: "v4.0.8"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Node.js / Bun Version
      placeholder: "Node 20.11.0 / Bun 1.1.0"
    validations:
      required: true

  - type: input
    id: discord-lib
    attributes:
      label: Discord Library
      placeholder: "discord.js 14.18.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows 10/11
        - macOS
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: debug-logs
    attributes:
      label: Debug Logs
      description: |
        Paste output from `manager.on("Debug", console.log)`.
        This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: code
    attributes:
      label: Relevant Code
      description: Minimal code snippet that reproduces the issue.
      render: typescript

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have checked the [documentation](https://github.com/Roki-Stella-Projects/StellaLib/tree/main/docs)
          required: true
        - label: I am using the latest version of StellaLib
